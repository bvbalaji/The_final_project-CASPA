<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" width="540" height="140">
  <defs>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>

  <!-- Stars -->
  <circle cx="12" cy="22" r="2.5" fill="#FFD700"/>
  <circle cx="38" cy="8"  r="1.5" fill="white" opacity="0.85"/>
  <circle cx="62" cy="28" r="2"   fill="#FFD700" opacity="0.9"/>
  <circle cx="20" cy="55" r="1.5" fill="white"   opacity="0.6"/>
  <!-- 4-point sparkle -->
  <path d="M52 14 L53.2 10 L54.4 14 L51 12 Z M52 14 L55 12 L52 16 L50.8 12 Z" fill="white" opacity="0.7"/>

  <!-- Rocket — tilted 30° pointing up-right -->
  <g transform="translate(72,72) rotate(-30) translate(-15,-52)" filter="url(#dropshadow)">
    <!-- Exhaust flame -->
    <path d="M6 90 Q15 112 15 122 Q15 112 24 90 Z" fill="url(#flame)"/>
    <!-- Body -->
    <rect x="3" y="22" width="24" height="70" rx="12" fill="white"/>
    <!-- Nose cone -->
    <path d="M3 35 L15 4 L27 35 Z" fill="white"/>
    <!-- Left fin -->
    <path d="M3 82 L-11 100 L3 64 Z" fill="rgba(255,255,255,0.8)"/>
    <!-- Right fin -->
    <path d="M27 82 L41 100 L27 64 Z" fill="rgba(255,255,255,0.8)"/>
    <!-- Pink stripe -->
    <rect x="3" y="62" width="24" height="7" rx="2" fill="#FF2D78"/>
    <!-- Porthole ring -->
    <circle cx="15" cy="44" r="9" fill="#FFD700"/>
    <!-- Porthole glass -->
    <circle cx="15" cy="44" r="6" fill="#FF8C00" opacity="0.6"/>
    <!-- Porthole highlight -->
    <circle cx="11" cy="40" r="2.5" fill="white" opacity="0.5"/>
  </g>

  <!-- CASPA lettering -->
  <text x="132" y="87"
        font-family="'Arial Black','Impact','Franklin Gothic Heavy',sans-serif"
        font-size="72" font-weight="900" fill="white"
        filter="url(#dropshadow)" letter-spacing="2">CASPA</text>

  <!-- Gold underbar -->
  <rect x="132" y="96" width="394" height="4" rx="2" fill="#FFD700"/>

  <!-- Tagline -->
  <text x="134" y="120"
        font-family="'Courier New',Courier,monospace"
        font-size="14" fill="rgba(255,255,255,0.88)"
        letter-spacing="3.5">CAREER ASsisted PATH APP</text>
</svg>
